workflows:
  build-dopamine-rootful:
    name: Build Dopamine Rootful IPA
    max_build_duration: 120

    environment:
      xcode: latest
      vars:
        THEOS: "/Users/builder/clone/theos"

    scripts:
      # ──────────────────────────────────────────────
      # 01 你原样保留
      # ──────────────────────────────────────────────
      - name: 01 - 环境与调试信息
        script: |
          set -x
          echo "=== 当前工作目录 ==="
          pwd
          echo "=== 仓库根目录列表 ==="
          ls -la
          echo "=== 当前Xcode ==="
          xcode-select -p
          xcodebuild -version
          echo "=== 可用SDK ==="
          xcodebuild -showsdks
          echo "=== iPhoneOS SDK 路径 ==="
          xcrun --show-sdk-path --sdk iphoneos

      # ──────────────────────────────────────────────
      # 02 - 只修 trustcache 编译：sha.h 找不到的根因
      #     用 libmd 的正确头/库路径，不走 OPENSSL=1
      # ──────────────────────────────────────────────
      - name: 02 - 安装系统依赖 + 编译 trustcache
        script: |
          set -ex
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install ldid xz libarchive dpkg make libmd
          eval "$(brew shellenv)"
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          echo "PATH=$PATH" >> $CM_ENV

          which ldid ; which gmake ; brew --prefix libmd

          # 把 libmd 头/库钉到编译器默认搜索
          LM="$(brew --prefix libmd)"
          export CPATH="$LM/include${CPATH:+:$CPATH}"
          export LIBRARY_PATH="$LM/lib${LIBRARY_PATH:+:$LIBRARY_PATH}"
          # 让 Makefile 的 cc 也能捡到（有些写死 $(CC) 不带 -I）
          export CFLAGS="-I$LM/include"
          export LDFLAGS="-L$LM/lib"

          TRUSTCACHE_DIR="/Users/builder/clone/trustcache"
          if [ ! -d "$TRUSTCACHE_DIR" ]; then
            git clone --depth=1 https://github.com/CRKatri/trustcache.git "$TRUSTCACHE_DIR"
          fi
          cd "$TRUSTCACHE_DIR"
          git pull --ff-only 2>/dev/null || true

          # 清理 + 用 gmake（Makefile 里就是 cc + -lmd 的路子）
          gmake clean
          gmake -j$(sysctl -n hw.ncpu) 2>&1

          test -x trustcache || { echo "❌ trustcache 没编出来"; exit 1; }
          echo "✅ trustcache ready: $(./trustcache --version 2>/dev/null || echo ok)"
          # 放到一个稳定位置，后面 PATH 好钉
          cp trustcache /usr/local/bin/trustcache || true

      # ──────────────────────────────────────────────
      # 03 你原样保留
      # ──────────────────────────────────────────────
      - name: 03 - 安装与配置THEOS
        script: |
          set -x
          export THEOS="$CM_BUILD_DIR/theos"
          echo "THEOS=$THEOS" >> $CM_ENV
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          fi
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"

      # ──────────────────────────────────────────────
      # 04 你原样保留（Xcode 26+ 补丁）
      # ──────────────────────────────────────────────
      - name: 04 - 应用Xcode 26+兼容性补丁
        script: |
          set -x
          OPA_DIR="$CM_BUILD_DIR/BaseBin/opainject"
          if [ -d "$OPA_DIR" ]; then
            OPA_MK="$OPA_DIR/Makefile"
            [ -f "$OPA_MK" ] && sed -i '' '/[Cc]ore[Ss]ymbolication/d' "$OPA_MK"
            for SRC in "$OPA_DIR"/*.m "$OPA_DIR"/*.mm "$OPA_DIR"/*.c "$OPA_DIR"/*.h; do
              [ -f "$SRC" ] || continue
              grep -q '#.*<.*CoreSymbolication' "$SRC" && \
                sed -i '' 's|^\(.*#.*<.*CoreSymbolication.*\)|// 补丁: Xcode 26+ \1|' "$SRC"
            done
          fi
          for HEADER in "$CM_BUILD_DIR/BaseBin/arm64.h" "$CM_BUILD_DIR/BaseBin/opainject/arm64.h"; do
            [ -f "$HEADER" ] || continue
            grep -q '^#include <stdint.h>' "$HEADER" || \
              sed -i '' '1s|^|#include <stdint.h>\n#include <stdbool.h>\n|' "$HEADER"
          done
          BOOT_MK="$CM_BUILD_DIR/BaseBin/bootstrapfs/Makefile"
          if [ -f "$BOOT_MK" ]; then
            sed -i '' '/^TARGET[[:space:]]*:=/d' "$BOOT_MK"
            sed -i '' '1s|^|TARGET := iphone:clang:14.0:14.0\n\n|' "$BOOT_MK"
            sed -i '' 's|\.theos/obj/debug/|.theos/obj/release/|g' "$BOOT_MK"
          fi
          echo "兼容性补丁应用完成."

      # ──────────────────────────────────────────────
      # 05 - BaseBin：确保 trustcache 一定在 PATH，然后让 make 自己干活
      #     不造假 tc，不碰偏移文件，不加额外仓库
      # ──────────────────────────────────────────────
      - name: 05 - 构建BaseBin
        script: |
          set -ex
          source $CM_ENV
          export SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          export SYSROOT="$SDK"
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:/usr/local/bin:$PATH"

          # 钉死 trustcache 可见性（02 可能装到了 /usr/local/bin 或 clone 目录）
          TRDIR="/Users/builder/clone/trustcache"
          [ -x "$TRDIR/trustcache" ] && export PATH="$TRDIR:$PATH"
          which trustcache || true

          export THEOS="$CM_BUILD_DIR/theos"
          cd "$CM_BUILD_DIR/BaseBin"
          echo "=== BaseBin build ==="

          # 全量编：允许子目标 skip（-k），但我们要看到失败
          make FINALPACKAGE=1 \
            THEOS="$THEOS" \
            THEOS_IPHONEOS_SDK="$SDK" \
            IPHONEOS_SYSROOT="$SDK" \
            SYSROOT="$SDK" \
            -k 2>&1 || true

          # 你原来的 fix_subproject 照留（用来保 cp 路径）
          fix_subproject(){
            local d="$1" n="$2" f="$CM_BUILD_DIR/BaseBin/$1"
            [ -d "$f" ] || return
            local b=$(find "$f/.theos/obj" -maxdepth 2 -name "$n" -type f ! -path "*/.dSYM/*" 2>/dev/null|head-1)
            [ -z "$b" ]&&return
            mkdir -p "$f/.theos/obj/debug" "$f/.theos/obj/release"
            cp -v "$b" "$f/.theos/obj/debug/$n"
            cp -v "$b" "$f/.theos/obj/release/$n"
            cp -v "$b" "$f/$n" 2>/dev/null||true
          }
          for p in bootstrapfs makerw opainject jbctl forkfix launchdhook systemhook watchdoghook dyldhook idownloadd boomerang rootlesshooks;do
            fix_subproject "$p" "$(basename $p)"
          done
          fix_subproject libjailbreak libjailbreak.dylib
          fix_subproject XPF libxpf.dylib
          echo "子项目产物修复完成."

          # basebin.tar
          make basebin.tar FINALPACKAGE=1 THEOS="$THEOS" THEOS_IPHONEOS_SDK="$SDK" IPHONEOS_SYSROOT="$SDK" SYSROOT="$SDK" 2>&1 || \
            (cd "$CM_BUILD_DIR/BaseBin"&&tar cf basebin.tar .build)
          test -s basebin.tar

          # basebin.tc —— 这次必须让 trustcache 命令说话
          # 先清掉可能残存的假 tc
          rm -f basebin.tc
          make basebin.tc FINALPACKAGE=1 THEOS="$THEOS" THEOS_IPHONEOS_SDK="$SDK" IPHONEOS_SYSROOT="$SDK" SYSROOT="$SDK" 2>&1 || true

          if [ ! -s basebin.tc ]; then
            echo "⚠️ make basebin.tc 没出文件，直调 trustcache…"
            which trustcache
            trustcache create .build/basebin.tc .build
          fi
          test -s basebin.tc || { echo "❌ basebin.tc 还是没出来"; exit 1; }
          echo "✅ BaseBin done"; ls -lh basebin.tar basebin.tc

      # ──────────────────────────────────────────────
      # 06 / 07 你原样保留
      # ──────────────────────────────────────────────
      - name: 06 - 下载Bootstraps
        script: |
          set -x
          RES_DIR="$CM_BUILD_DIR/Application/Dopamine/Resources"
          [ -x "$RES_DIR/download_bootstraps.sh" ] && { cd "$RES_DIR"; ./download_bootstraps.sh; } || true

      - name: 07 - 构建Packages
        script: |
          set -x
          [ -d "$CM_BUILD_DIR/Packages" ] && cd "$CM_BUILD_DIR/Packages" && make || true

      # ──────────────────────────────────────────────
      # 08/09/10 你原样保留（只保证 PATH 带 theos/make）
      # ──────────────────────────────────────────────
      - name: 08 - 编译Dopamine应用
        script: |
          set -x
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          PROJECT_FILE=""
          for NAME in Dopamine dopamine; do
            C=$(find "$CM_BUILD_DIR/Application" -maxdepth 3 -name "${NAME}.xcodeproj" -o -name "${NAME}.xcworkspace" 2>/dev/null|head-1)
            [ -n "$C" ]&&{ PROJECT_FILE="$C";break;}
          done
          [ -z "$PROJECT_FILE" ]&& PROJECT_FILE=$(find "$CM_BUILD_DIR" -maxdepth 4 -not -path "*/BaseBin/*" \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) 2>/dev/null|head-1)
          [ -z "$PROJECT_FILE" ]&&{ echo "❌ no xcode proj";exit 1;}
          echo "找到: $PROJECT_FILE"
          PD=$(dirname "$PROJECT_FILE")
          cd "$PD"
          SN=$(basename "$PROJECT_FILE"|sed 's/\.xcodeproj//;s/\.xcworkspace//')
          DD="$CM_BUILD_DIR/build"
          xcodebuild -scheme "$SN" -config Release -sdk iphoneos -derivedDataPath "$DD" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM=""

      - name: 09 - 打包为IPA
        script: |
          set -x
          AP=$(find "$CM_BUILD_DIR/build" -maxdepth 6 -name "Dopamine.app" -type d|head-1)
          [ -z "$AP" ]&&{ echo "❌ no app";exit 1;}
          ID="$CM_BUILD_DIR/ipa_output";mkdir -p "$ID";rm -rf "$ID/Payload"
          mkdir "$ID/Payload";cp -R "$AP" "$ID/Payload/"
          cd "$ID";zip -qr Dopamine_Rootful.ipa Payload
          ls -lh "$ID/Dopamine_Rootful.ipa"

    artifacts:
      - ipa_output/Dopamine_Rootful.ipa
