workflows:
  build-dopamine-rootful:
    name: Build Dopamine Rootful IPA
    max_build_duration: 120

    environment:
      xcode: latest
      vars:
        THEOS: "/Users/builder/clone/theos"

    scripts:
      - name: 01 - 环境与调试信息
        script: |
          set -x
          echo "=== 当前工作目录 ==="
          pwd
          echo "=== 仓库根目录列表 ==="
          ls -la
          echo "=== 当前Xcode ==="
          xcode-select -p
          xcodebuild -version
          echo "=== iPhoneOS SDK 路径 ==="
          xcrun --show-sdk-path --sdk iphoneos

      - name: 02 - 安装系统依赖 + 编译 trustcache
        script: |
          set -x
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install ldid xz libarchive dpkg openssl make autoconf automake
          brew install make
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          echo "PATH=$PATH" >> $CM_ENV
          which ldid
          which dpkg-deb
          which openssl

          # —— 编译 trustcache（macOS 宿主工具，官方来源 CRKatri）——
          echo "=== 编译 trustcache ==="
          TRUSTCACHE_DIR="/Users/builder/clone/trustcache"
          if [ ! -d "$TRUSTCACHE_DIR" ]; then
            git clone --depth=1 https://github.com/CRKatri/trustcache.git "$TRUSTCACHE_DIR"
          fi
          cd "$TRUSTCACHE_DIR"
          git pull || true
          # 用 gmake（brew 的 gnu make），OPENSSL=1 让它与 brew openssl 链接
          gmake clean || true
          OPENSSL_DIR="$(brew --prefix openssl)"
          gmake -j$(sysctl -n hw.ncpu) OPENSSL=1 CFLAGS="-I${OPENSSL_DIR}/include" LDFLAGS="-L${OPENSSL_DIR}/lib" 2>&1
          if [ ! -f trustcache ]; then
            echo "❌ trustcache 编译失败，看上面日志"
            exit 1
          fi
          # 放进可被 BaseBin Makefile 找到的地方
          cp -f trustcache /usr/local/bin/trustcache 2>/dev/null || \
          cp -f trustcache "$CM_BUILD_DIR/" 2>/dev/null || true
          chmod +x trustcache
          export PATH="$TRUSTCACHE_DIR:$PATH"
          echo "trustcache 就绪: $(which trustcache)"
          trustcache 2>&1 || true

      - name: 03 - 安装与配置THEOS
        script: |
          set -x
          export THEOS="$CM_BUILD_DIR/theos"
          echo "THEOS=$THEOS" >> $CM_ENV
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          fi
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"

      - name: 04 - 应用Xcode 26+兼容性补丁
        script: |
          set -x
          echo "开始应用补丁..."
          OPA_DIR="$CM_BUILD_DIR/BaseBin/opainject"
          if [ -d "$OPA_DIR" ]; then
            OPA_MK="$OPA_DIR/Makefile"
            if [ -f "$OPA_MK" ]; then
              sed -i '' '/[Cc]ore[Ss]ymbolication/d' "$OPA_MK"
            fi
            for SRC in "$OPA_DIR"/*.m "$OPA_DIR"/*.mm "$OPA_DIR"/*.c "$OPA_DIR"/*.h; do
              [ -f "$SRC" ] || continue
              if grep -q '#.*<.*CoreSymbolication' "$SRC"; then
                sed -i '' 's|^\(.*#.*<.*CoreSymbolication.*\)|// 补丁: Xcode 26+ 不包含此框架 \1|' "$SRC"
              fi
            done
          fi
          for HEADER in "$CM_BUILD_DIR/BaseBin/arm64.h" "$CM_BUILD_DIR/BaseBin/opainject/arm64.h"; do
            [ -f "$HEADER" ] || continue
            if ! grep -q '^#include <stdint.h>' "$HEADER"; then
              sed -i '' '1s|^|#include <stdint.h>\n#include <stdbool.h>\n|' "$HEADER"
            fi
          done
          BOOT_MK="$CM_BUILD_DIR/BaseBin/bootstrapfs/Makefile"
          if [ -f "$BOOT_MK" ]; then
            sed -i '' '/^TARGET[[:space:]]*:=/d' "$BOOT_MK"
            sed -i '' '1s|^|TARGET := iphone:clang:14.0:14.0\n\n|' "$BOOT_MK"
            if grep -q '\.theos/obj/debug/' "$BOOT_MK"; then
              sed -i '' 's|\.theos/obj/debug/|.theos/obj/release/|g' "$BOOT_MK"
            fi
          fi
          echo "兼容性补丁应用完成."

      - name: 05 - 构建BaseBin
        script: |
          set -x
          source $CM_ENV
          export SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          export SYSROOT="$SDK"
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:/usr/local/bin:$PATH"
          # 确保 trustcache 在 PATH
          export PATH="/Users/builder/clone/trustcache:$PATH"
          export THEOS="$CM_BUILD_DIR/theos"

          # 预检
          echo "=== trustcache 检查 ==="
          which trustcache || echo "⚠️ trustcache 仍不在 PATH，make basebin.tc 会 fail"
          trustcache 2>&1 || true

          cd "$CM_BUILD_DIR/BaseBin"
          echo "=== full make ==="
          make FINALPACKAGE=1 \
            THEOS="$THEOS" \
            THEOS_IPHONEOS_SDK="$SDK" \
            IPHONEOS_SYSROOT="$SDK" \
            SYSROOT="$SDK"

          echo "=== 验证产物 ==="
          ls -lh basebin.tar basebin.tc 2>/dev/null || true
          [ -s basebin.tar ] || { echo "❌ basebin.tar missing"; exit 1; }
          [ -s basebin.tc  ] || { echo "❌ basebin.tc missing";  exit 1; }

      - name: 06 - 下载Bootstraps
        script: |
          set -x
          RES_DIR="$CM_BUILD_DIR/Application/Dopamine/Resources"
          if [ -f "$RES_DIR/download_bootstraps.sh" ]; then
            cd "$RES_DIR"
            chmod +x download_bootstraps.sh
            ./download_bootstraps.sh
          fi

      - name: 07 - 构建Packages
        script: |
          set -x
          if [ -d "$CM_BUILD_DIR/Packages" ]; then
            cd "$CM_BUILD_DIR/Packages"
            make
          fi

      - name: 08 - 编译Dopamine应用
        script: |
          set -x
          PROJECT_FILE=""
          for NAME in "Dopamine" "dopamine"; do
            CANDIDATE=$(find "$CM_BUILD_DIR/Application" -maxdepth 3 -name "${NAME}.xcodeproj" -o -name "${NAME}.xcworkspace" 2>/dev/null | head -1)
            if [ -n "$CANDIDATE" ]; then PROJECT_FILE="$CANDIDATE"; break; fi
          done
          if [ -z "$PROJECT_FILE" ]; then
            PROJECT_FILE=$(find "$CM_BUILD_DIR" -maxdepth 4 -not -path "*/BaseBin/*" \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) 2>/dev/null | head -1)
          fi
          if [ -z "$PROJECT_FILE" ]; then echo "❌ Xcode project not found"; exit 1; fi
          echo "找到项目: $PROJECT_FILE"
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          cd "$PROJECT_DIR"
          SCHEME_NAME=$(basename "$PROJECT_FILE" | sed 's/\.xcodeproj//;s/\.xcworkspace//')
          DERIVED_DATA="$CM_BUILD_DIR/build"
          xcodebuild \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM=""

      - name: 09 - 打包为IPA
        script: |
          set -x
          APP_PATH=$(find "$CM_BUILD_DIR/build" -maxdepth 6 -name "Dopamine.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then echo "❌ Dopamine.app not found"; exit 1; fi
          echo "找到: $APP_PATH"
          IPA_DIR="$CM_BUILD_DIR/ipa_output"
          mkdir -p "$IPA_DIR"
          rm -rf "$IPA_DIR"/Payload
          mkdir "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -qr "Dopamine_Rootful.ipa" Payload
          ls -lh "$IPA_DIR/Dopamine_Rootful.ipa"

    artifacts:
      - ipa_output/Dopamine_Rootful.ipa
