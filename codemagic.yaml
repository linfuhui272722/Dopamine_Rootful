workflows:
  build-dopamine-rootful:
    name: Build Dopamine Rootful IPA
    max_build_duration: 120

    environment:
      xcode: latest
      vars:
        THEOS: "/Users/builder/clone/theos"

    scripts:
      - name: 01 - 环境与调试信息
        script: |
          set -x
          echo "=== 当前工作目录 ==="
          pwd
          echo "=== 仓库根目录列表 ==="
          ls -la
          echo "=== 当前Xcode ==="
          xcode-select -p
          xcodebuild -version
          echo "=== 可用SDK ==="
          xcodebuild -showsdks
          echo "=== iPhoneOS SDK 路径 ==="
          xcrun --show-sdk-path --sdk iphoneos

      - name: 02 - 安装系统依赖
        script: |
          set -x
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install ldid xz libarchive dpkg
          brew install make
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          echo "PATH=$PATH" >> $CM_ENV
          which ldid
          which xz
          which make
          make --version
          find /opt/homebrew -name "archive.h" 2>/dev/null | head -1

      - name: 03 - 安装与配置THEOS
        script: |
          set -x
          export THEOS="$CM_BUILD_DIR/theos"
          echo "THEOS=$THEOS" >> $CM_ENV
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          fi
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"

      - name: 04 - 应用Xcode 26+兼容性补丁
        script: |
          set -x
          echo "开始应用补丁..."
          OPA_DIR="$CM_BUILD_DIR/BaseBin/opainject"
          if [ -d "$OPA_DIR" ]; then
            OPA_MK="$OPA_DIR/Makefile"
            if [ -f "$OPA_MK" ]; then
              sed -i '' '/[Cc]ore[Ss]ymbolication/d' "$OPA_MK"
            fi
            for SRC in "$OPA_DIR"/*.m "$OPA_DIR"/*.mm "$OPA_DIR"/*.c "$OPA_DIR"/*.h; do
              [ -f "$SRC" ] || continue
              if grep -q '#.*<.*CoreSymbolication' "$SRC"; then
                sed -i '' 's|^\(.*#.*<.*CoreSymbolication.*\)|// 补丁: Xcode 26+ 不包含此框架 \1|' "$SRC"
              fi
            done
          fi
          for HEADER in "$CM_BUILD_DIR/BaseBin/arm64.h" "$CM_BUILD_DIR/BaseBin/opainject/arm64.h"; do
            [ -f "$HEADER" ] || continue
            if ! grep -q '^#include <stdint.h>' "$HEADER"; then
              sed -i '' '1s|^|#include <stdint.h>\n#include <stdbool.h>\n|' "$HEADER"
            fi
          done
          BOOT_MK="$CM_BUILD_DIR/BaseBin/bootstrapfs/Makefile"
          if [ -f "$BOOT_MK" ]; then
            sed -i '' '/^TARGET[[:space:]]*:=/d' "$BOOT_MK"
            sed -i '' '1s|^|TARGET := iphone:clang:14.0:14.0\n\n|' "$BOOT_MK"
            if grep -q '\.theos/obj/debug/' "$BOOT_MK"; then
              sed -i '' 's|\.theos/obj/debug/|.theos/obj/release/|g' "$BOOT_MK"
            fi
          fi
          echo "兼容性补丁应用完成。"

      - name: 05 - 构建BaseBin
        script: |
          set -x
          source $CM_ENV
          export SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          export SYSROOT="$SDK"
          cd "$CM_BUILD_DIR/BaseBin"
          echo "开始构建BaseBin..."
          make FINALPACKAGE=1 \
            THEOS="$THEOS" \
            THEOS_IPHONEOS_SDK="$SDK" \
            IPHONEOS_SYSROOT="$SDK" \
            SYSROOT="$SDK"
          echo "开始修复bootstrapfs产物路径..."
          BOOT_DIR="$CM_BUILD_DIR/BaseBin/bootstrapfs"
          BUILT_BINARY=$(find "$BOOT_DIR/.theos/obj" -name "bootstrapfs" -type f 2>/dev/null | head -1)
          if [ -z "$BUILT_BINARY" ] || [ ! -f "$BUILT_BINARY" ]; then
            echo "错误：未找到已构建的 bootstrapfs 可执行文件。"
            find "$BOOT_DIR/.theos" -type f 2>/dev/null || true
            exit 1
          fi
          echo "找到构建产物: $BUILT_BINARY"
          ls -lh "$BUILT_BINARY"
          mkdir -p "$BOOT_DIR/.theos/obj/debug"
          cp -v "$BUILT_BINARY" "$BOOT_DIR/.theos/obj/debug/bootstrapfs"
          mkdir -p "$BOOT_DIR/.theos/obj/release"
          cp -v "$BUILT_BINARY" "$BOOT_DIR/.theos/obj/release/bootstrapfs"
          cp -v "$BUILT_BINARY" "$BOOT_DIR/bootstrapfs"
          echo "验证复制结果："
          TARGET_PATHS=(
            "$BOOT_DIR/.theos/obj/debug/bootstrapfs"
            "$BOOT_DIR/.theos/obj/release/bootstrapfs"
            "$BOOT_DIR/bootstrapfs"
          )
          ALL_OK=true
          for TARGET in "${TARGET_PATHS[@]}"; do
            if [ -f "$TARGET" ] && [ -x "$TARGET" ]; then
              echo "  ✓ 就位: $TARGET"
            else
              echo "  ✗ 缺失: $TARGET"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = true ]; then
            echo "所有bootstrapfs文件已成功就位。"
          else
            echo "错误：部分bootstrapfs文件复制失败。"
            exit 1
          fi

      - name: 06 - 下载Bootstraps
        script: |
          set -x
          RES_DIR="$CM_BUILD_DIR/Application/Dopamine/Resources"
          if [ -f "$RES_DIR/download_bootstraps.sh" ]; then
            cd "$RES_DIR"
            chmod +x download_bootstraps.sh
            ./download_bootstraps.sh
          fi

      - name: 07 - 构建Packages
        script: |
          set -x
          if [ -d "$CM_BUILD_DIR/Packages" ]; then
            cd "$CM_BUILD_DIR/Packages"
            make
          fi

      - name: 08 - 编译Dopamine应用
        script: |
          set -x
          PROJ_DIR="$CM_BUILD_DIR/Application/Dopamine"
          [ -d "$PROJ_DIR" ] || PROJ_DIR="$CM_BUILD_DIR/Dopamine"
          if [ ! -d "$PROJ_DIR" ]; then
            echo "错误：找不到Xcode项目目录"
            exit 1
          fi
          cd "$PROJ_DIR"
          xcodebuild \
            -scheme Dopamine \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: 09 - 打包为IPA
        script: |
          set -x
          APP_PATH="$CM_BUILD_DIR/Application/Dopamine/build/Release-iphoneos/Dopamine.app"
          if [ ! -d "$APP_PATH" ]; then
            find "$CM_BUILD_DIR" -name "*.app" -type d 2>/dev/null
            exit 1
          fi
          IPA_DIR="$CM_BUILD_DIR/ipa_output"
          mkdir -p "$IPA_DIR"
          cd "$IPA_DIR"
          rm -rf Payload
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -qr "Dopamine_Rootful.ipa" Payload
          echo "IPA创建成功:"
          ls -lh "$IPA_DIR/Dopamine_Rootful.ipa"

    artifacts:
      - ipa_output/Dopamine_Rootful.ipa
