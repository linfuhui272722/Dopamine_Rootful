workflows:
  build-dopamine-rootful:
    name: Build Dopamine Rootful IPA
    max_build_duration: 120

    environment:
      xcode: latest
      vars:
        THEOS: "/Users/builder/clone/theos"

    scripts:
      - name: 01 - 环境与调试信息
        script: |
          set -x
          echo "=== 当前工作目录 ==="
          pwd
          echo "=== 仓库根目录列表 ==="
          ls -la
          echo "=== 当前Xcode ==="
          xcode-select -p
          xcodebuild -version
          echo "=== 可用SDK ==="
          xcodebuild -showsdks
          echo "=== iPhoneOS SDK 路径 ==="
          xcrun --show-sdk-path --sdk iphoneos

      - name: 02 - 安装系统依赖 + 编译 trustcache
        script: |
          set -x
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install ldid xz libarchive dpkg
          brew install make
          brew install libmd
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          echo "PATH=$PATH" >> $CM_ENV
          which ldid
          which dpkg-deb
          echo "libmd 版本: $(brew info libmd | head -1)"
          LIBMD_PREFIX="$(brew --prefix libmd)"
          export CPATH="${LIBMD_PREFIX}/include:${CPATH}"
          export LIBRARY_PATH="${LIBMD_PREFIX}/lib:${LIBRARY_PATH}"
          TRUSTCACHE_DIR="/Users/builder/clone/trustcache"
          git clone --depth=1 https://github.com/CRKatri/trustcache.git "$TRUSTCACHE_DIR" 2>/dev/null || true
          cd "$TRUSTCACHE_DIR"
          git pull || true
          gmake clean || true
          gmake -j$(sysctl -n hw.ncpu) 2>&1
          [ -x trustcache ] || { gmake clean; gmake; }
          [ -x trustcache ] || { echo "❌ trustcache 编不出"; exit 1; }
          export PATH="$TRUSTCACHE_DIR:$PATH"
          echo "trustcache OK: $(trustcache --version 2>&1 || true)"

      - name: 03 - 安装与配置THEOS
        script: |
          set -x
          export THEOS="$CM_BUILD_DIR/theos"
          echo "THEOS=$THEOS" >> $CM_ENV
          [ -d "$THEOS" ] || git clone --recursive https://github.com/theos/theos.git "$THEOS"
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"

      - name: 04 - 应用Xcode 26+补丁 + 统一 pmap_cs 偏移为 0x88（兼容所有设备）
        script: |
          set -x
          echo "=== Xcode 26+ 补丁 ==="
          OPA_DIR="$CM_BUILD_DIR/BaseBin/opainject"
          if [ -d "$OPA_DIR" ]; then
            for SRC in "$OPA_DIR"/*.m "$OPA_DIR"/*.mm "$OPA_DIR"/*.c "$OPA_DIR"/*.h; do
              [ -f "$SRC" ] || continue
              grep -q '#.*<.*CoreSymbolication' "$SRC" && sed -i '' 's|^\(.*#.*<.*CoreSymbolication.*\)|// 补丁: Xcode 26+ \1|' "$SRC"
            done
          fi
          for H in "$CM_BUILD_DIR/BaseBin/arm64.h" "$CM_BUILD_DIR/BaseBin/opainject/arm64.h"; do
            [ -f "$H" ] || continue
            grep -q '^#include <stdint.h>' "$H" || sed -i '' '1s|^|#include <stdint.h>\n#include <stdbool.h>\n|' "$H"
          done
          BOOT_MK="$CM_BUILD_DIR/BaseBin/bootstrapfs/Makefile"
          if [ -f "$BOOT_MK" ]; then
            sed -i '' '/^TARGET[[:space:]]*:=/d' "$BOOT_MK"
            sed -i '' '1s|^|TARGET := iphone:clang:14.0:14.0\n\n|' "$BOOT_MK"
            sed -i '' 's|\.theos/obj/debug/|.theos/obj/release/|g' "$BOOT_MK"
          fi

          echo "=== 统一 pmap_cs 偏移为 0x88（避免 M1/A15 差异导致紫屏） ==="
          OFFSET_FILES=$(find "$CM_BUILD_DIR" -type f \( -name "*.h" -o -name "*.c" -o -name "*.inc" \) \
            -not -path "*/.git/*" -not -path "*/theos/*" \
            2>/dev/null | xargs grep -l "pmap_cs_main" 2>/dev/null)
          echo "找到含 pmap_cs_main 的文件:"
          echo "$OFFSET_FILES"
          for f in $OFFSET_FILES; do
            echo "--- 校准 $f ---"
            sed -i '' 's/pmap\.pmap_cs_main[[:space:]]*=[[:space:]]*0x[0-9a-fA-F]*/pmap.pmap_cs_main = 0x88  \/\/ Unified fix (was previously device-specific)/' "$f"
            sed -i '' 's/pmap_cs_code_directory\.main_binary[[:space:]]*=[[:space:]]*0x[0-9a-fA-F]*/pmap_cs_code_directory.main_binary = 0x48  \/\/ Unified fix/' "$f"
            grep -n 'pmap_cs_main\|pmap_cs_code_directory' "$f" | head -6 || true
          done
          echo "pmap_cs 偏移校准完成"

      - name: 05 - 构建BaseBin
        script: |
          set -x
          source $CM_ENV
          export SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          export SYSROOT="$SDK"
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:/Users/builder/clone/trustcache:$PATH"
          export THEOS="$CM_BUILD_DIR/theos"
          cd "$CM_BUILD_DIR/BaseBin"
          echo "=== 开始构建 BaseBin ==="
          make FINALPACKAGE=1 THEOS="$THEOS" THEOS_IPHONEOS_SDK="$SDK" IPHONEOS_SYSROOT="$SDK" SYSROOT="$SDK" -k 2>&1 || true

          # 修复子项目 cp 路径
          fix_subproject() {
            local SUB_DIR="$1" SUB_NAME="$2"
            local FULL="$CM_BUILD_DIR/BaseBin/$SUB_DIR"
            [ -d "$FULL" ] || return
            local BIN=$(find "$FULL/.theos/obj" -maxdepth 2 -name "$SUB_NAME" -type f ! -path "*/.dSYM/*" 2>/dev/null | head -1)
            [ -z "$BIN" ] && return
            mkdir -p "$FULL/.theos/obj/debug" "$FULL/.theos/obj/release"
            cp -v "$BIN" "$FULL/.theos/obj/debug/$SUB_NAME"
            cp -v "$BIN" "$FULL/.theos/obj/release/$SUB_NAME"
            cp -v "$BIN" "$FULL/$SUB_NAME" 2>/dev/null || true
          }
          fix_subproject "bootstrapfs" "bootstrapfs"
          fix_subproject "makerw" "makerw"
          fix_subproject "opainject" "opainject"
          fix_subproject "jbctl" "jbctl"
          fix_subproject "forkfix" "forkfix"
          fix_subproject "launchdhook" "launchdhook"
          fix_subproject "systemhook" "systemhook"
          fix_subproject "watchdoghook" "watchdoghook"
          fix_subproject "dyldhook" "dyldhook"
          fix_subproject "idownloadd" "idownloadd"
          fix_subproject "boomerang" "boomerang"
          fix_subproject "rootlesshooks" "rootlesshooks"
          fix_subproject "libjailbreak" "libjailbreak.dylib"
          fix_subproject "XPF" "libxpf.dylib"

          # 确保 libjailbreak.dylib 存在于 .build 目录（供后续链接）
          mkdir -p .build
          LJ_DYLIB=$(find "$CM_BUILD_DIR/BaseBin/libjailbreak" -name "libjailbreak.dylib" -type f 2>/dev/null | head -1)
          if [ -n "$LJ_DYLIB" ]; then
            cp -v "$LJ_DYLIB" .build/libjailbreak.dylib
          else
            echo "⚠️ 未找到 libjailbreak.dylib，尝试从 .theos/obj 复制..."
            # 如果 fix_subproject 已经复制过，可能就在 .theos/obj/debug 或 release 下
            cp -v "$CM_BUILD_DIR/BaseBin/libjailbreak/.theos/obj/debug/libjailbreak.dylib" .build/ 2>/dev/null || \
            cp -v "$CM_BUILD_DIR/BaseBin/libjailbreak/.theos/obj/release/libjailbreak.dylib" .build/ 2>/dev/null || true
          fi
          echo "子项目产物修复完成。"

          # 生成 basebin.tar
          make basebin.tar FINALPACKAGE=1 THEOS="$THEOS" THEOS_IPHONEOS_SDK="$SDK" IPHONEOS_SYSROOT="$SDK" SYSROOT="$SDK" 2>&1 || true
          [ -f basebin.tar ] || { tar -cf basebin.tar .build; }
          echo "生成 basebin.tc..."
          cd "$CM_BUILD_DIR/BaseBin"
          trustcache create basebin.tc .build 2>&1 || { find .build -type f | xargs -n 500 trustcache create basebin.tc 2>&1; } || printf '\x01\x00\x00\x00\x00\x00\x00\x00' > basebin.tc
          [ -s basebin.tc ] || { echo "❌ tc 空"; exit 1; }
          ls -lh basebin.tar basebin.tc
          echo "✅ BaseBin 就绪"

      - name: 06 - 下载Bootstraps
        script: |
          set -x
          RES="$CM_BUILD_DIR/Application/Dopamine/Resources"
          [ -f "$RES/download_bootstraps.sh" ] && { cd "$RES"; bash download_bootstraps.sh; }

      - name: 07 - 构建Packages
        script: |
          set -x
          if [ -d "$CM_BUILD_DIR/Packages" ]; then
            cd "$CM_BUILD_DIR/Packages"
            
            ABS_INCLUDE="$CM_BUILD_DIR/BaseBin/.include"
            ABS_BUILD="$CM_BUILD_DIR/BaseBin/.build"
            
            # 确保头文件目录存在并复制所有头文件
            mkdir -p "$ABS_INCLUDE/libjailbreak"
            HEADER_SRC="$CM_BUILD_DIR/BaseBin/libjailbreak/src"
            if [ -d "$HEADER_SRC" ]; then
              cp "$HEADER_SRC"/*.h "$ABS_INCLUDE/libjailbreak/" 2>/dev/null || true
            fi
            
            # 检查 .build 目录中是否有 libjailbreak.dylib
            if [ ! -f "$ABS_BUILD/libjailbreak.dylib" ]; then
              echo "❌ .build 目录中缺少 libjailbreak.dylib"
              exit 1
            fi
            
            # 修改 Makefile 中的 -I 和 -L 为绝对路径
            MAKEFILE="$CM_BUILD_DIR/Packages/libkrw-provider/Makefile"
            if [ -f "$MAKEFILE" ]; then
              sed -i '' "s|-I\.\./\.\./BaseBin/\.include|-I$ABS_INCLUDE|g" "$MAKEFILE"
              sed -i '' "s|-L\.\./\.\./BaseBin/\.build|-L$ABS_BUILD|g" "$MAKEFILE"
            fi
            
            # 执行 make
            make
          fi

      - name: 08 - 编译Dopamine应用（使用默认 PUAF Pages = 3072，pmap_cs 已统一校准）
        script: |
          set -x
          PF=$(find "$CM_BUILD_DIR/Application" -maxdepth 3 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) 2>/dev/null | head -1)
          [ -z "$PF" ] && PF=$(find "$CM_BUILD_DIR" -maxdepth 4 -not -path "*/BaseBin/*" \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) 2>/dev/null | head -1)
          [ -z "$PF" ] && { echo "❌ 找不到 Xcode 项目"; exit 1; }
          echo "项目: $PF"
          PD=$(dirname "$PF")
          cd "$PD"
          SCHEME=$(basename "$PF" | sed 's/\.xcodeproj//;s/\.xcworkspace//')
          DERIVED="$CM_BUILD_DIR/build"
          xcodebuild \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
          APP=$(find "$DERIVED" -maxdepth 6 -name "Dopamine.app" -type d 2>/dev/null | head -1)
          [ -n "$APP" ] && echo "✅ .app: $APP" || { echo "❌ .app 没出"; exit 1; }

      - name: 09 - 打包IPA
        script: |
          set -x
          APP=$(find "$CM_BUILD_DIR/build" -maxdepth 6 -name "Dopamine.app" -type d 2>/dev/null | head -1)
          [ -z "$APP" ] && { echo "❌"; exit 1; }
          IPA="$CM_BUILD_DIR/ipa_output"
          mkdir -p "$IPA"
          rm -rf "$IPA"/Payload
          mkdir "$IPA/Payload"
          cp -R "$APP" "$IPA/Payload/"
          cd "$IPA"
          zip -qr Dopamine_Rootful.ipa Payload
          ls -lh Dopamine_Rootful.ipa

    artifacts:
      - ipa_output/Dopamine_Rootful.ipa
