workflows:
  build-dopamine-rootful:
    name: Build Dopamine Rootful IPA
    max_build_duration: 90
    environment:
      xcode: latest
      vars:
        THEOS: "/Users/builder/clone/theos"
    scripts:
      - name: Point xcode-select & detect REAL iPhoneOS SDK
        script: |
          # 让命令行工具绑定到当前 Xcode
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer 2>/dev/null \
          || sudo xcode-select -s "$(ls -d /Applications/Xcode-*.app | head -1)/Contents/Developer"
          xcode-select -p
          xcodebuild -showsdks
          # 获取真实 iPhoneOS SDK 路径
          IPHONEOS_SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          echo "Real SDK path: $IPHONEOS_SDK"
          echo "THEOS_IPHONEOS_SDK=$IPHONEOS_SDK" >> $CM_ENV
          echo "SYSROOT=$IPHONEOS_SDK" >> $CM_ENV

      - name: Install THEOS
        script: |
          export THEOS="$CM_BUILD_DIR/theos"
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $CM_ENV

      - name: Install system dependencies
        script: |
          brew install ldid xz || true

      - name: Build BaseBin
        script: |
          export THEOS="$CM_BUILD_DIR/theos"
          export IPHONEOS_SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          export SYSROOT="$IPHONEOS_SDK"
          cd BaseBin
          make FINALPACKAGE=1 \
            THEOS_IPHONEOS_SDK="$IPHONEOS_SDK" \
            IPHONEOS_SYSROOT="$IPHONEOS_SDK" \
            SYSROOT="$IPHONEOS_SDK"

      - name: Download bootstraps
        script: |
          cd $CM_BUILD_DIR/Application/Dopamine/Resources
          chmod +x download_bootstraps.sh
          ./download_bootstraps.sh

      - name: Build Packages
        script: |
          cd $CM_BUILD_DIR/Packages
          make

      - name: Build Dopamine app (unsigned)
        script: |
          cd $CM_BUILD_DIR/Application/Dopamine
          xcodebuild \
            -scheme Dopamine \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA
        script: |
          cd $CM_BUILD_DIR/Application/Dopamine/build/Release-iphoneos
          mkdir -p Payload
          cp -R Dopamine.app Payload/
          zip -r Dopamine_Rootful.ipa Payload

    artifacts:
      - Application/Dopamine/build/Release-iphoneos/Dopamine_Rootful.ipa
