workflows:
  build-dopamine-rootful:
    name: Build Dopamine Rootful IPA
    max_build_duration: 120

    environment:
      xcode: latest
      vars:
        THEOS: "/Users/builder/clone/theos"

    scripts:
      - name: 01 - 环境与调试信息
        script: |
          set -x
          echo "=== 当前工作目录 ==="
          pwd
          echo "=== 仓库根目录列表 ==="
          ls -la
          echo "=== 当前Xcode ==="
          xcode-select -p
          xcodebuild -version
          echo "=== 可用SDK ==="
          xcodebuild -showsdks
          echo "=== iPhoneOS SDK 路径 ==="
          xcrun --show-sdk-path --sdk iphoneos

      - name: 02 - 安装系统依赖
        script: |
          set -x
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install ldid xz libarchive dpkg
          brew install make
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          echo "PATH=$PATH" >> $CM_ENV
          which ldid
          which xz
          which make
          make --version
          which dpkg-deb
          find /opt/homebrew -name "archive.h" 2>/dev/null | head -1

      - name: 03 - 安装与配置THEOS
        script: |
          set -x
          export THEOS="$CM_BUILD_DIR/theos"
          echo "THEOS=$THEOS" >> $CM_ENV
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          fi
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"

      - name: 04 - 应用Xcode 26+兼容性补丁
        script: |
          set -x
          echo "开始应用补丁..."
          OPA_DIR="$CM_BUILD_DIR/BaseBin/opainject"
          if [ -d "$OPA_DIR" ]; then
            OPA_MK="$OPA_DIR/Makefile"
            if [ -f "$OPA_MK" ]; then
              sed -i '' '/[Cc]ore[Ss]ymbolication/d' "$OPA_MK"
            fi
            for SRC in "$OPA_DIR"/*.m "$OPA_DIR"/*.mm "$OPA_DIR"/*.c "$OPA_DIR"/*.h; do
              [ -f "$SRC" ] || continue
              if grep -q '#.*<.*CoreSymbolication' "$SRC"; then
                sed -i '' 's|^\(.*#.*<.*CoreSymbolication.*\)|// 补丁: Xcode 26+ 不包含此框架 \1|' "$SRC"
              fi
            done
          fi
          for HEADER in "$CM_BUILD_DIR/BaseBin/arm64.h" "$CM_BUILD_DIR/BaseBin/opainject/arm64.h"; do
            [ -f "$HEADER" ] || continue
            if ! grep -q '^#include <stdint.h>' "$HEADER"; then
              sed -i '' '1s|^|#include <stdint.h>\n#include <stdbool.h>\n|' "$HEADER"
            fi
          done
          BOOT_MK="$CM_BUILD_DIR/BaseBin/bootstrapfs/Makefile"
          if [ -f "$BOOT_MK" ]; then
            sed -i '' '/^TARGET[[:space:]]*:=/d' "$BOOT_MK"
            sed -i '' '1s|^|TARGET := iphone:clang:14.0:14.0\n\n|' "$BOOT_MK"
            if grep -q '\.theos/obj/debug/' "$BOOT_MK"; then
              sed -i '' 's|\.theos/obj/debug/|.theos/obj/release/|g' "$BOOT_MK"
            fi
          fi
          echo "兼容性补丁应用完成。"

      - name: 05 - 构建BaseBin
        script: |
          set -x
          source $CM_ENV
          export SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          export SYSROOT="$SDK"
          cd "$CM_BUILD_DIR/BaseBin"
          echo "开始构建BaseBin..."

          # 先执行完整的构建（允许子项目错误继续）
          make FINALPACKAGE=1 \
            THEOS="$THEOS" \
            THEOS_IPHONEOS_SDK="$SDK" \
            IPHONEOS_SYSROOT="$SDK" \
            SYSROOT="$SDK" \
            -k 2>&1 || true

          echo "开始修复所有子项目的产物路径..."

          # 定义一个函数：修复单个子项目的 cp 路径
          fix_subproject() {
            local SUB_DIR="$1"
            local SUB_NAME="$2"
            local FULL_DIR="$CM_BUILD_DIR/BaseBin/$SUB_DIR"
            if [ ! -d "$FULL_DIR" ]; then
              return
            fi
            # 查找实际生成的二进制文件（排除 .dSYM 等）
            local ACTUAL_BIN=$(find "$FULL_DIR/.theos/obj" -maxdepth 2 -name "$SUB_NAME" -type f ! -path "*/.dSYM/*" 2>/dev/null | head -1)
            if [ -z "$ACTUAL_BIN" ] || [ ! -f "$ACTUAL_BIN" ]; then
              echo "  跳过 $SUB_DIR：未找到产物"
              return
            fi
            echo "  修复 $SUB_DIR：找到产物 $ACTUAL_BIN"
            # 复制到 debug 和 release 目录
            mkdir -p "$FULL_DIR/.theos/obj/debug"
            mkdir -p "$FULL_DIR/.theos/obj/release"
            cp -v "$ACTUAL_BIN" "$FULL_DIR/.theos/obj/debug/$SUB_NAME"
            cp -v "$ACTUAL_BIN" "$FULL_DIR/.theos/obj/release/$SUB_NAME"
            # 同时复制到子项目根目录（某些 Makefile 可能期望）
            cp -v "$ACTUAL_BIN" "$FULL_DIR/$SUB_NAME" 2>/dev/null || true
          }

          # 修复已知的子项目（根据仓库实际结构调整）
          fix_subproject "bootstrapfs" "bootstrapfs"
          fix_subproject "makerw" "makerw"
          fix_subproject "opainject" "opainject"
          fix_subproject "jbctl" "jbctl"
          fix_subproject "forkfix" "forkfix"
          fix_subproject "launchdhook" "launchdhook"
          fix_subproject "systemhook" "systemhook"
          fix_subproject "watchdoghook" "watchdoghook"
          fix_subproject "dyldhook" "dyldhook"
          fix_subproject "idownloadd" "idownloadd"
          fix_subproject "boomerang" "boomerang"
          fix_subproject "rootlesshooks" "rootlesshooks"
          fix_subproject "libjailbreak" "libjailbreak.dylib"
          fix_subproject "XPF" "libxpf.dylib"

          echo "子项目产物修复完成。"

          # 现在重新运行 make 以生成 basebin.tar 和 basebin.tc
          echo "生成 basebin.tar 和 basebin.tc..."
          make basebin.tar basebin.tc FINALPACKAGE=1 \
            THEOS="$THEOS" \
            THEOS_IPHONEOS_SDK="$SDK" \
            IPHONEOS_SYSROOT="$SDK" \
            SYSROOT="$SDK" || true

          # 检查文件是否存在
          if [ ! -f "$CM_BUILD_DIR/BaseBin/basebin.tar" ]; then
            echo "警告：basebin.tar 未生成，尝试查找..."
            FOUND_TAR=$(find "$CM_BUILD_DIR/BaseBin" -name "basebin.tar" -type f 2>/dev/null | head -1)
            if [ -n "$FOUND_TAR" ]; then
              cp "$FOUND_TAR" "$CM_BUILD_DIR/BaseBin/basebin.tar"
            else
              echo "错误：无法找到 basebin.tar，构建可能不完整。"
              exit 1
            fi
          fi
          if [ ! -f "$CM_BUILD_DIR/BaseBin/basebin.tc" ]; then
            echo "警告：basebin.tc 未生成，尝试查找..."
            FOUND_TC=$(find "$CM_BUILD_DIR/BaseBin" -name "basebin.tc" -type f 2>/dev/null | head -1)
            if [ -n "$FOUND_TC" ]; then
              cp "$FOUND_TC" "$CM_BUILD_DIR/BaseBin/basebin.tc"
            else
              echo "错误：无法找到 basebin.tc，构建可能不完整。"
              exit 1
            fi
          fi

          echo "所有文件已就位："
          ls -lh "$CM_BUILD_DIR/BaseBin/basebin.tar" "$CM_BUILD_DIR/BaseBin/basebin.tc"

      - name: 06 - 下载Bootstraps
        script: |
          set -x
          RES_DIR="$CM_BUILD_DIR/Application/Dopamine/Resources"
          if [ -f "$RES_DIR/download_bootstraps.sh" ]; then
            cd "$RES_DIR"
            chmod +x download_bootstraps.sh
            ./download_bootstraps.sh
          fi

      - name: 07 - 构建Packages
        script: |
          set -x
          if [ -d "$CM_BUILD_DIR/Packages" ]; then
            cd "$CM_BUILD_DIR/Packages"
            make
          fi

      - name: 08 - 编译Dopamine应用
        script: |
          set -x
          # 智能查找 Dopamine 的 Xcode 项目
          PROJECT_FILE=""
          for NAME in "Dopamine" "dopamine"; do
            CANDIDATE=$(find "$CM_BUILD_DIR/Application" -maxdepth 3 -name "${NAME}.xcodeproj" -o -name "${NAME}.xcworkspace" 2>/dev/null | head -1)
            if [ -n "$CANDIDATE" ]; then
              PROJECT_FILE="$CANDIDATE"
              break
            fi
          done
          if [ -z "$PROJECT_FILE" ]; then
            echo "未在 Application 目录找到 Dopamine 项目，全局搜索..."
            PROJECT_FILE=$(find "$CM_BUILD_DIR" -maxdepth 4 -not -path "*/BaseBin/*" \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) 2>/dev/null | head -1)
          fi
          if [ -z "$PROJECT_FILE" ]; then
            echo "错误：未找到任何 Xcode 项目文件"
            find "$CM_BUILD_DIR" -maxdepth 4 -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null || true
            exit 1
          fi
          echo "找到项目文件: $PROJECT_FILE"
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          cd "$PROJECT_DIR"
          echo "工作目录: $(pwd)"
          echo "可用的 Schemes:"
          xcodebuild -list -project "$PROJECT_FILE" 2>/dev/null || xcodebuild -list -workspace "$PROJECT_FILE" 2>/dev/null || true
          SCHEME_NAME=$(basename "$PROJECT_FILE" | sed 's/\.xcodeproj//;s/\.xcworkspace//')
          echo "尝试使用 Scheme: $SCHEME_NAME"
          xcodebuild \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: 09 - 打包为IPA
        script: |
          set -x
          APP_PATH=$(find "$CM_BUILD_DIR" -maxdepth 5 -name "Dopamine.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "错误：未找到 Dopamine.app 构建产物"
            find "$CM_BUILD_DIR" -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "找到 .app 文件: $APP_PATH"
          IPA_DIR="$CM_BUILD_DIR/ipa_output"
          mkdir -p "$IPA_DIR"
          cd "$IPA_DIR"
          rm -rf Payload
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -qr "Dopamine_Rootful.ipa" Payload
          echo "IPA创建成功:"
          ls -lh "$IPA_DIR/Dopamine_Rootful.ipa"

    artifacts:
      - ipa_output/Dopamine_Rootful.ipa
