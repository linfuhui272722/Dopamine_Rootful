workflows:
  build-dopamine-rootful:
    name: Build Dopamine Rootful IPA
    max_build_duration: 120

    environment:
      xcode: latest
      vars:
        THEOS: "/Users/builder/clone/theos"

    scripts:
      - name: 01 - 环境与调试信息
        script: |
          set -x
          echo "=== 当前工作目录 ==="
          pwd
          echo "=== 仓库根目录列表 ==="
          ls -la
          echo "=== 当前Xcode ==="
          xcode-select -p
          xcodebuild -version
          echo "=== 可用SDK ==="
          xcodebuild -showsdks
          echo "=== iPhoneOS SDK 路径 ==="
          xcrun --show-sdk-path --sdk iphoneos

      - name: 02 - 安装系统依赖
        script: |
          set -x
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install ldid xz libarchive dpkg
          brew install make
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          echo "PATH=$PATH" >> $CM_ENV
          which ldid
          which xz
          which make
          make --version
          which dpkg-deb
          find /opt/homebrew -name "archive.h" 2>/dev/null | head -1

      - name: 03 - 安装与配置THEOS
        script: |
          set -x
          export THEOS="$CM_BUILD_DIR/theos"
          echo "THEOS=$THEOS" >> $CM_ENV
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          fi
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"

      - name: 04 - 应用Xcode 26+兼容性补丁
        script: |
          set -x
          echo "开始应用补丁..."
          OPA_DIR="$CM_BUILD_DIR/BaseBin/opainject"
          if [ -d "$OPA_DIR" ]; then
            OPA_MK="$OPA_DIR/Makefile"
            if [ -f "$OPA_MK" ]; then
              sed -i '' '/[Cc]ore[Ss]ymbolication/d' "$OPA_MK"
            fi
            for SRC in "$OPA_DIR"/*.m "$OPA_DIR"/*.mm "$OPA_DIR"/*.c "$OPA_DIR"/*.h; do
              [ -f "$SRC" ] || continue
              if grep -q '#.*<.*CoreSymbolication' "$SRC"; then
                sed -i '' 's|^\(.*#.*<.*CoreSymbolication.*\)|// 补丁: Xcode 26+ 不包含此框架 \1|' "$SRC"
              fi
            done
          fi
          for HEADER in "$CM_BUILD_DIR/BaseBin/arm64.h" "$CM_BUILD_DIR/BaseBin/opainject/arm64.h"; do
            [ -f "$HEADER" ] || continue
            if ! grep -q '^#include <stdint.h>' "$HEADER"; then
              sed -i '' '1s|^|#include <stdint.h>\n#include <stdbool.h>\n|' "$HEADER"
            fi
          done
          BOOT_MK="$CM_BUILD_DIR/BaseBin/bootstrapfs/Makefile"
          if [ -f "$BOOT_MK" ]; then
            sed -i '' '/^TARGET[[:space:]]*:=/d' "$BOOT_MK"
            sed -i '' '1s|^|TARGET := iphone:clang:14.0:14.0\n\n|' "$BOOT_MK"
            if grep -q '\.theos/obj/debug/' "$BOOT_MK"; then
              sed -i '' 's|\.theos/obj/debug/|.theos/obj/release/|g' "$BOOT_MK"
            fi
          fi
          echo "兼容性补丁应用完成。"

      - name: 05 - 构建BaseBin
        script: |
          set -x
          source $CM_ENV
          export SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          export SYSROOT="$SDK"
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          export THEOS="$CM_BUILD_DIR/theos"

          cd "$CM_BUILD_DIR/BaseBin"
          echo "=== 开始构建 BaseBin ==="

          # —— 1. 全量构建（允许子项目错）——
          make FINALPACKAGE=1 \
            THEOS="$THEOS" \
            THEOS_IPHONEOS_SDK="$SDK" \
            IPHONEOS_SYSROOT="$SDK" \
            SYSROOT="$SDK" \
            -k 2>&1 || true

          # —— 2. 尝试编译 trustcache（macOS 主机工具）——
          echo "编译 trustcache..."
          TC_DIR=$(find "$CM_BUILD_DIR/BaseBin" -maxdepth 3 -name "trustcache" -type d 2>/dev/null | head -1)
          if [ -z "$TC_DIR" ]; then
            TC_C=$(find "$CM_BUILD_DIR/BaseBin" -maxdepth 3 -name "trustcache.c" -type f 2>/dev/null | head -1)
            if [ -n "$TC_C" ]; then
              TC_DIR=$(dirname "$TC_C")
            fi
          fi
          if [ -n "$TC_DIR" ]; then
            echo "找到 trustcache 源码目录: $TC_DIR"
            cd "$TC_DIR"
            if [ -f Makefile ]; then
              make 2>&1 || true
            fi
            if [ ! -f trustcache ] && [ -f trustcache.c ]; then
              clang -O2 trustcache.c -o trustcache -I. 2>&1 || true
            fi
            if [ -f trustcache ] && [ -x trustcache ]; then
              export PATH="$TC_DIR:$PATH"
              echo "trustcache 编译成功: $TC_DIR/trustcache"
              trustcache --help 2>&1 || true
            else
              echo "⚠️ trustcache 编译失败，将使用 Python 生成 basebin.tc"
            fi
          else
            echo "⚠️ 未找到 trustcache 源码，将使用 Python 生成 basebin.tc"
          fi
          cd "$CM_BUILD_DIR/BaseBin"

          # —— 3. 修复子项目 cp 路径——
          fix_subproject() {
            local SUB_DIR="$1" SUB_NAME="$2"
            local FULL="$CM_BUILD_DIR/BaseBin/$SUB_DIR"
            [ -d "$FULL" ] || return
            local BIN=$(find "$FULL/.theos/obj" -maxdepth 2 -name "$SUB_NAME" -type f ! -path "*/.dSYM/*" 2>/dev/null | head -1)
            [ -z "$BIN" ] && return
            mkdir -p "$FULL/.theos/obj/debug" "$FULL/.theos/obj/release"
            cp -v "$BIN" "$FULL/.theos/obj/debug/$SUB_NAME"
            cp -v "$BIN" "$FULL/.theos/obj/release/$SUB_NAME"
            cp -v "$BIN" "$FULL/$SUB_NAME" 2>/dev/null || true
          }
          fix_subproject "bootstrapfs" "bootstrapfs"
          fix_subproject "makerw" "makerw"
          fix_subproject "opainject" "opainject"
          fix_subproject "jbctl" "jbctl"
          fix_subproject "forkfix" "forkfix"
          fix_subproject "launchdhook" "launchdhook"
          fix_subproject "systemhook" "systemhook"
          fix_subproject "watchdoghook" "watchdoghook"
          fix_subproject "dyldhook" "dyldhook"
          fix_subproject "idownloadd" "idownloadd"
          fix_subproject "boomerang" "boomerang"
          fix_subproject "rootlesshooks" "rootlesshooks"
          fix_subproject "libjailbreak" "libjailbreak.dylib"
          fix_subproject "XPF" "libxpf.dylib"
          echo "子项目产物修复完成。"

          # —— 4. 生成 basebin.tar（如果 make 失败则手动打包）——
          echo "生成 basebin.tar..."
          make basebin.tar FINALPACKAGE=1 \
            THEOS="$THEOS" \
            THEOS_IPHONEOS_SDK="$SDK" \
            IPHONEOS_SYSROOT="$SDK" \
            SYSROOT="$SDK" 2>&1 || true
          if [ ! -f "$CM_BUILD_DIR/BaseBin/basebin.tar" ]; then
            echo "make basebin.tar 失败，手动打包 .build 目录..."
            cd "$CM_BUILD_DIR/BaseBin"
            if [ -d ".build" ] && [ "$(ls -A .build)" ]; then
              tar -cf basebin.tar .build
              echo "手动 basebin.tar 创建成功"
            else
              echo "错误：.build 目录为空或不存在"
              exit 1
            fi
          fi

          # —— 5. 生成 basebin.tc ——
          echo "生成 basebin.tc..."
          # 先尝试用 make（如果 trustcache 命令已可用）
          make basebin.tc FINALPACKAGE=1 \
            THEOS="$THEOS" \
            THEOS_IPHONEOS_SDK="$SDK" \
            IPHONEOS_SYSROOT="$SDK" \
            SYSROOT="$SDK" 2>&1 || true

          if [ ! -f "$CM_BUILD_DIR/BaseBin/basebin.tc" ]; then
            echo "make basebin.tc 失败，使用 Python 生成..."
            python3 -c "
import os, struct, hashlib
build_dir = '/Users/builder/clone/BaseBin/.build'
output_path = '/Users/builder/clone/BaseBin/basebin.tc'
entries = []
for root, dirs, files in os.walk(build_dir):
    for f in sorted(files):
        filepath = os.path.join(root, f)
        relpath = os.path.relpath(filepath, build_dir)
        with open(filepath, 'rb') as fp:
            data = fp.read()
        sha1 = hashlib.sha1(data).digest()
        path_bytes = relpath.encode('utf-8')
        entries.append((sha1, path_bytes))
entries.sort(key=lambda e: e[1])
count = len(entries)
header = struct.pack('<II', 1, count)
with open(output_path, 'wb') as f:
    f.write(header)
    for sha1, path_bytes in entries:
        f.write(sha1)
        f.write(struct.pack('<I', len(path_bytes)))
        f.write(path_bytes)
print(f'Generated basebin.tc with {count} entries')
"
          fi

          # —— 6. 验证 ——
          echo "=== 最终验证 ==="
          ls -lh "$CM_BUILD_DIR/BaseBin/basebin.tar" "$CM_BUILD_DIR/BaseBin/basebin.tc"
          if [ ! -s "$CM_BUILD_DIR/BaseBin/basebin.tc" ]; then
            echo "❌ basebin.tc 仍然是空的或不存在"
            exit 1
          fi
          echo "✅ BaseBin 构建成功"

      - name: 06 - 下载Bootstraps
        script: |
          set -x
          RES_DIR="$CM_BUILD_DIR/Application/Dopamine/Resources"
          if [ -f "$RES_DIR/download_bootstraps.sh" ]; then
            cd "$RES_DIR"
            chmod +x download_bootstraps.sh
            ./download_bootstraps.sh
          fi

      - name: 07 - 构建Packages
        script: |
          set -x
          if [ -d "$CM_BUILD_DIR/Packages" ]; then
            cd "$CM_BUILD_DIR/Packages"
            make
          fi

      - name: 08 - 编译Dopamine应用
        script: |
          set -x
          # 智能查找 Dopamine 的 Xcode 项目
          PROJECT_FILE=""
          for NAME in "Dopamine" "dopamine"; do
            CANDIDATE=$(find "$CM_BUILD_DIR/Application" -maxdepth 3 -name "${NAME}.xcodeproj" -o -name "${NAME}.xcworkspace" 2>/dev/null | head -1)
            if [ -n "$CANDIDATE" ]; then
              PROJECT_FILE="$CANDIDATE"
              break
            fi
          done
          if [ -z "$PROJECT_FILE" ]; then
            echo "未在 Application 目录找到 Dopamine 项目，全局搜索..."
            PROJECT_FILE=$(find "$CM_BUILD_DIR" -maxdepth 4 -not -path "*/BaseBin/*" \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) 2>/dev/null | head -1)
          fi
          if [ -z "$PROJECT_FILE" ]; then
            echo "错误：未找到任何 Xcode 项目文件"
            find "$CM_BUILD_DIR" -maxdepth 4 -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null || true
            exit 1
          fi
          echo "找到项目文件: $PROJECT_FILE"
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          cd "$PROJECT_DIR"
          echo "工作目录: $(pwd)"
          echo "可用的 Schemes:"
          xcodebuild -list -project "$PROJECT_FILE" 2>/dev/null || xcodebuild -list -workspace "$PROJECT_FILE" 2>/dev/null || true
          SCHEME_NAME=$(basename "$PROJECT_FILE" | sed 's/\.xcodeproj//;s/\.xcworkspace//')
          echo "尝试使用 Scheme: $SCHEME_NAME"

          DERIVED_DATA="$CM_BUILD_DIR/build"
          xcodebuild \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: 09 - 打包为IPA
        script: |
          set -x
          APP_PATH=$(find "$CM_BUILD_DIR/build" -maxdepth 5 -name "Dopamine.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "错误：未找到 Dopamine.app 构建产物"
            find "$CM_BUILD_DIR" -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "找到 .app 文件: $APP_PATH"
          IPA_DIR="$CM_BUILD_DIR/ipa_output"
          mkdir -p "$IPA_DIR"
          cd "$IPA_DIR"
          rm -rf Payload
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -qr "Dopamine_Rootful.ipa" Payload
          echo "IPA创建成功:"
          ls -lh "$IPA_DIR/Dopamine_Rootful.ipa"

    artifacts:
      - ipa_output/Dopamine_Rootful.ipa
