workflows:
  build-dopamine-rootful:
    name: Build Dopamine Rootful IPA
    max_build_duration: 120

    environment:
      xcode: "15.2"
      vars:
        THEOS: "/Users/builder/clone/theos"

    scripts:
      - name: Install THEOS
        script: |
          export THEOS="$CM_BUILD_DIR/theos"
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $CM_ENV

      - name: Install dependencies
        script: |
          brew install ldid xz

      - name: Build BaseBin
        script: |
          cd BaseBin
          make

      - name: Download bootstraps
        script: |
          cd Application/Dopamine/Resources
          chmod +x download_bootstraps.sh
          ./download_bootstraps.sh

      - name: Build Packages
        script: |
          cd Packages
          make

      - name: Build Dopamine app
        script: |
          cd Application/Dopamine
          xcodebuild \
            -scheme Dopamine \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA
        script: |
          cd Application/Dopamine/build/Release-iphoneos
          mkdir -p Payload
          cp -R Dopamine.app Payload/
          zip -r Dopamine_Rootful.ipa Payload

    artifacts:
      - Application/Dopamine/build/Release-iphoneos/Dopamine_Rootful.ipa
